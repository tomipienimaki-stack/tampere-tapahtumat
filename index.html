<!DOCTYPE html>
<html lang="fi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#C8102E">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>Tampere – Mitä tapahtuu?</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    :root{--red:#C8102E;--red-l:#fce8eb;--bg:#f0f2f5;--card:#fff;--text:#111827;--muted:#6b7280;--border:#e5e7eb;--nav-h:60px;--hdr-h:54px;--r:14px;--sh:0 2px 10px rgba(0,0,0,.09)}
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    html,body{height:100%;font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);overflow:hidden}

    /* HEADER */
    #hdr{position:fixed;top:0;left:0;right:0;height:var(--hdr-h);background:var(--red);display:flex;align-items:center;padding:0 16px;gap:10px;z-index:900}
    .hdr-logo{width:30px;height:30px;background:#fff;border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px;color:var(--red);flex-shrink:0}
    .hdr-text{flex:1;color:#fff}.hdr-text h1{font-size:15px;font-weight:800}.hdr-text p{font-size:10.5px;opacity:.82}

    /* NAV */
    #nav{position:fixed;bottom:0;left:0;right:0;height:var(--nav-h);background:var(--card);border-top:1px solid var(--border);display:flex;z-index:900;padding-bottom:env(safe-area-inset-bottom)}
    .nb{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;background:none;border:none;cursor:pointer;color:var(--muted);font-size:9.5px;font-family:inherit;font-weight:600;position:relative;padding:6px 2px}
    .nb.on{color:var(--red)}.nb.on::before{content:'';position:absolute;top:0;left:25%;right:25%;height:2.5px;background:var(--red);border-radius:0 0 3px 3px}
    .nb-icon{font-size:21px;line-height:1}

    /* MAIN */
    #main{position:fixed;top:var(--hdr-h);bottom:var(--nav-h);left:0;right:0;overflow:hidden}
    .view{position:absolute;inset:0;display:none;flex-direction:column;overflow:hidden}.view.on{display:flex}

    /* SHARED: chips */
    .chips-bar{display:flex;gap:7px;overflow-x:auto;scrollbar-width:none;padding:10px 16px;background:var(--card);border-bottom:1px solid var(--border);flex-shrink:0}
    .chips-bar::-webkit-scrollbar{display:none}
    .chip{flex-shrink:0;display:flex;align-items:center;gap:5px;padding:7px 12px;border-radius:20px;border:1.5px solid var(--border);background:var(--card);font-size:12px;font-family:inherit;font-weight:600;cursor:pointer;white-space:nowrap;color:var(--muted)}
    .chip.on{border-color:var(--red);background:var(--red-l);color:var(--red)}

    /* ══ VIIKONLOPPU VIEW ══ */
    #wk-view{background:var(--bg)}
    #wk-hdr{background:var(--card);padding:14px 16px 10px;border-bottom:1px solid var(--border);flex-shrink:0}
    .wk-title-row{display:flex;align-items:baseline;gap:8px;margin-bottom:10px}
    .wk-main-title{font-size:20px;font-weight:800}.wk-dates{font-size:13px;color:var(--muted)}
    .wk-day-tabs{display:flex;gap:6px}
    .wk-tab{flex:1;padding:9px 4px;border-radius:10px;border:2px solid var(--border);background:var(--card);font-size:12px;font-family:inherit;font-weight:600;cursor:pointer;text-align:center;color:var(--muted);line-height:1.4}
    .wk-tab.on{border-color:var(--red);background:var(--red-l);color:var(--red)}
    .tab-cnt{display:inline-block;font-size:10px;font-weight:700;border-radius:10px;padding:1px 5px}
    .wk-tab.on .tab-cnt{background:var(--red);color:#fff}.wk-tab:not(.on) .tab-cnt{background:var(--muted);color:#fff}
    #wk-scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:12px 16px 8px}
    .section-lbl{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;margin:14px 0 7px}
    .no-evts{text-align:center;padding:30px 0;color:var(--muted);font-size:14px}

    /* ══ BIG CARD ══ */
    .big-card{border-radius:16px;overflow:hidden;margin-bottom:10px;box-shadow:var(--sh);cursor:pointer}
    .big-card:active{opacity:.9}
    .bc-banner{padding:14px 16px 12px;display:flex;flex-direction:column;gap:4px;position:relative}
    .bc-badge{display:inline-flex;align-items:center;gap:5px;background:rgba(255,255,255,.22);border:1.5px solid rgba(255,255,255,.4);color:#fff;font-size:10px;font-weight:800;letter-spacing:.6px;text-transform:uppercase;padding:3px 8px;border-radius:20px;align-self:flex-start;margin-bottom:4px}
    .bc-name{font-size:19px;font-weight:800;color:#fff;line-height:1.2}
    .bc-sub{font-size:12px;color:rgba(255,255,255,.85);margin-top:2px}
    .bc-foot{background:#fff;padding:11px 16px;display:flex;align-items:center;gap:8px}
    .bc-meta{flex:1;font-size:12px;color:var(--muted);display:flex;flex-direction:column;gap:2px}
    .bc-meta strong{color:var(--text);font-size:13px}
    .bc-price{font-weight:800;font-size:13px;white-space:nowrap}
    .bc-arrow{font-size:22px;color:var(--muted)}

    /* ══ SPORT CARD ══ */
    .sport-card{background:var(--card);border-radius:var(--r);margin-bottom:8px;box-shadow:var(--sh);cursor:pointer;overflow:hidden;display:flex}
    .sport-card:active{opacity:.9}
    .sc-stripe{width:5px;flex-shrink:0}
    .sc-body{flex:1;padding:12px 14px;display:flex;align-items:center;gap:10px}
    .sc-icon{font-size:24px;flex-shrink:0}
    .sc-info{flex:1;min-width:0}
    .sc-teams{font-size:14px;font-weight:700;line-height:1.3}
    .sc-meta{font-size:12px;color:var(--muted);margin-top:3px;display:flex;flex-wrap:wrap;gap:5px}
    .sc-league{font-size:10px;font-weight:700;background:var(--bg);color:var(--muted);border-radius:6px;padding:2px 6px;white-space:nowrap}
    .sc-price{font-size:12px;font-weight:700;color:var(--red);background:var(--red-l);padding:4px 8px;border-radius:8px;white-space:nowrap;flex-shrink:0}

    /* ══ GIG CARD ══ */
    .gig-card{background:var(--card);border-radius:var(--r);margin-bottom:8px;box-shadow:var(--sh);cursor:pointer}
    .gig-card:active{opacity:.87}
    .gc-body{padding:13px 14px 10px}
    .gc-top{display:flex;align-items:flex-start;gap:10px}
    .gc-left{flex:1;min-width:0}
    .gc-name{font-size:15px;font-weight:800;margin-bottom:3px;line-height:1.25}
    .gc-sub{font-size:12px;color:var(--muted);margin-bottom:7px;display:flex;gap:6px;flex-wrap:wrap}
    .gc-price{flex-shrink:0;font-size:12px;font-weight:700;padding:4px 8px;border-radius:8px;white-space:nowrap;margin-top:1px}
    .gc-price.paid{color:var(--red);background:var(--red-l)}.gc-price.free{color:#059669;background:#d1fae5}
    .genre-pills{display:flex;flex-wrap:wrap;gap:5px;margin-top:2px}
    .g-pill{font-size:10.5px;font-weight:600;padding:2px 8px;border-radius:20px;white-space:nowrap}
    .gc-soundslike{font-size:11.5px;color:var(--muted);font-style:italic;margin-top:8px;padding-top:8px;border-top:1px solid var(--border);line-height:1.5}

    /* ══ NORMAL EV CARD ══ */
    .ev-card{background:var(--card);border-radius:var(--r);padding:13px 14px;margin-bottom:8px;box-shadow:var(--sh);cursor:pointer;display:flex;gap:10px;align-items:flex-start}
    .ev-card:active{opacity:.85}
    .ev-left{flex:1;min-width:0}
    .cat-badge{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:700;padding:3px 8px;border-radius:20px;margin-bottom:5px}
    .ev-name{font-size:14px;font-weight:700;line-height:1.3;margin-bottom:3px}
    .ev-meta{font-size:11.5px;color:var(--muted);display:flex;flex-wrap:wrap;gap:5px}
    .price-tag{flex-shrink:0;font-size:11.5px;font-weight:700;padding:3px 8px;border-radius:8px;white-space:nowrap;margin-top:1px}
    .price-tag.paid{color:var(--red);background:var(--red-l)}.price-tag.free{color:#059669;background:#d1fae5}

    /* ══ TULOSSA VIEW ══ */
    #tu-view{background:var(--bg)}
    #tu-filter{background:var(--card);border-bottom:1px solid var(--border);padding:10px 16px;display:flex;gap:7px;overflow-x:auto;scrollbar-width:none;flex-shrink:0}
    #tu-filter::-webkit-scrollbar{display:none}
    #tu-scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}

    /* weekend block */
    .wk-block{margin:12px 16px 0}
    .wk-block-hdr{display:flex;align-items:center;gap:8px;padding:10px 14px;background:var(--card);border-radius:var(--r) var(--r) 0 0;border-bottom:2px solid var(--red);cursor:pointer}
    .wk-block-hdr:active{background:var(--bg)}
    .wk-block-dates{font-size:14px;font-weight:800;flex:1}
    .wk-block-cnt{font-size:11px;font-weight:700;color:var(--muted)}
    .wk-block-toggle{font-size:18px;color:var(--muted);transition:transform .2s}
    .wk-block.collapsed .wk-block-toggle{transform:rotate(-90deg)}
    .wk-block-body{background:var(--card);border-radius:0 0 var(--r) var(--r);overflow:hidden;margin-bottom:4px}
    .wk-block.collapsed .wk-block-body{display:none}

    /* compact event row inside tulossa block */
    .tu-row{display:flex;align-items:center;gap:10px;padding:10px 14px;border-top:1px solid var(--border);cursor:pointer}
    .tu-row:active{background:var(--bg)}
    .tu-row-left{flex:1;min-width:0}
    .tu-row-name{font-size:13.5px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .tu-row-meta{font-size:11px;color:var(--muted);margin-top:2px;display:flex;flex-wrap:wrap;gap:5px;align-items:center}
    .tu-row-price{font-size:12px;font-weight:700;white-space:nowrap;color:var(--red);flex-shrink:0}
    .tu-row-price.free{color:#059669}
    .tu-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
    .tu-big-dot{width:12px;height:12px;border-radius:50%;flex-shrink:0;box-shadow:0 0 0 3px rgba(200,16,46,.15)}
    .tu-sport-icon{font-size:18px;flex-shrink:0;width:22px;text-align:center}
    .tu-badge-big{font-size:9px;font-weight:800;letter-spacing:.5px;text-transform:uppercase;color:var(--red);background:var(--red-l);padding:1px 5px;border-radius:4px}
    .tu-genre-pills{display:flex;gap:4px;flex-wrap:wrap;margin-top:3px}
    .tu-arrow{font-size:18px;color:var(--border);flex-shrink:0}
    .tu-empty{text-align:center;padding:12px 14px;font-size:13px;color:var(--muted);border-top:1px solid var(--border)}
    .no-wk-block{text-align:center;padding:40px 20px;color:var(--muted);font-size:14px}

    /* ══ MAP VIEW ══ */
    #map-view{background:var(--bg)}
    #map-wrap{flex:1;position:relative}
    #map{height:100%;width:100%}
    #msearch{position:absolute;top:10px;left:10px;right:10px;z-index:800;background:#fff;border-radius:12px;box-shadow:var(--sh);display:flex;align-items:center;padding:0 14px;gap:8px}
    #msearch input{flex:1;border:none;outline:none;font-size:14px;font-family:inherit;padding:12px 0}
    #map-sheet{background:var(--card);border-radius:20px 20px 0 0;max-height:40vh;overflow-y:auto;box-shadow:0 -4px 20px rgba(0,0,0,.13);flex-shrink:0}
    .sh-handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:10px auto 4px}
    .sh-title{padding:6px 16px 10px;font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
    .map-ev{display:flex;align-items:center;gap:10px;padding:11px 16px;border-top:1px solid var(--border);cursor:pointer}
    .map-ev:active{background:var(--bg)}
    .map-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
    .map-ev-name{font-size:13.5px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .map-ev-sub{font-size:11.5px;color:var(--muted);margin-top:1px}

    /* ══ SEARCH VIEW ══ */
    #search-view{background:var(--bg)}
    #s-top{background:var(--card);border-bottom:1px solid var(--border);padding:12px 16px 8px;flex-shrink:0}
    .s-input{width:100%;background:var(--bg);border:2px solid var(--border);border-radius:12px;padding:13px 16px;font-size:16px;font-family:inherit;outline:none;transition:border-color .15s}
    .s-input:focus{border-color:var(--red)}
    #s-chips{flex-shrink:0}
    #s-results{flex:1;overflow-y:auto;padding:12px 16px 8px}
    .s-ph{text-align:center;color:var(--muted);margin-top:40px;font-size:14px;line-height:1.7}
    .s-ph .em{font-size:42px;display:block;margin-bottom:10px}

    /* ══ MODAL ══ */
    #m-ov{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:2000;display:none;align-items:flex-end}
    #m-ov.on{display:flex}
    #modal{background:var(--card);border-radius:22px 22px 0 0;width:100%;max-height:90vh;overflow-y:auto;padding-bottom:env(safe-area-inset-bottom);animation:up .25s ease}
    @keyframes up{from{transform:translateY(100%)}to{transform:translateY(0)}}
    .m-handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:12px auto 0}
    .m-banner{padding:18px 20px;position:relative}
    .m-banner-badge{display:inline-flex;align-items:center;gap:5px;background:rgba(255,255,255,.2);border:1.5px solid rgba(255,255,255,.35);color:#fff;font-size:10px;font-weight:800;letter-spacing:.6px;text-transform:uppercase;padding:3px 8px;border-radius:20px;margin-bottom:8px}
    .m-banner h2{font-size:21px;font-weight:800;color:#fff;line-height:1.25}
    .m-banner p{font-size:13px;color:rgba(255,255,255,.85);margin-top:4px}
    .m-close-b{position:absolute;top:14px;right:16px;width:32px;height:32px;border-radius:50%;background:rgba(255,255,255,.2);border:none;color:#fff;font-size:17px;cursor:pointer;display:flex;align-items:center;justify-content:center}
    .m-hdr{padding:16px 20px 4px;display:flex;align-items:flex-start;gap:10px}
    .m-title{flex:1}.m-title h2{font-size:19px;font-weight:800;line-height:1.3;margin-top:6px}
    .m-close2{width:34px;height:34px;border-radius:50%;background:var(--bg);border:none;font-size:17px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
    .m-body{padding:4px 20px 24px}
    .m-row{display:flex;align-items:flex-start;gap:10px;padding:11px 0;border-bottom:1px solid var(--border);font-size:13.5px}
    .m-icon{font-size:17px;width:22px;text-align:center;margin-top:1px;flex-shrink:0}
    .m-lbl{font-size:11px;color:var(--muted);margin-bottom:1px}
    .m-genre-block{padding:12px 0;border-bottom:1px solid var(--border)}
    .m-genre-row{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:8px}
    .m-sl{font-size:13px;color:var(--muted);font-style:italic;line-height:1.55;padding:10px 12px;background:var(--bg);border-radius:10px;border-left:3px solid var(--border)}
    .listen-btns{display:flex;gap:8px;margin-top:12px}
    .listen-btn{flex:1;display:flex;align-items:center;justify-content:center;gap:6px;padding:11px 8px;border-radius:12px;border:none;font-size:13px;font-family:inherit;font-weight:700;cursor:pointer;text-decoration:none}
    .listen-btn.sp{background:#1DB954;color:#fff}.listen-btn.yt{background:#FF0000;color:#fff}
    .m-desc{font-size:13.5px;line-height:1.65;margin:14px 0 10px}
    .m-cta{display:block;width:100%;padding:15px;background:var(--red);color:#fff;border:none;border-radius:12px;font-size:15px;font-family:inherit;font-weight:700;text-align:center;text-decoration:none;cursor:pointer;margin-top:10px}
    .m-sport-hdr{padding:18px 20px 14px;display:flex;flex-direction:column;align-items:center;gap:6px}
    .m-teams{display:flex;align-items:center;gap:10px;width:100%}
    .m-team{flex:1;text-align:center}
    .m-team-name{font-size:17px;font-weight:800}.m-team-sub{font-size:10px;color:var(--muted)}
    .m-vs{font-size:20px;font-weight:800;color:var(--muted);flex-shrink:0}
    ::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
  </style>
</head>
<body>
<header id="hdr">
  <div class="hdr-logo">T</div>
  <div class="hdr-text"><h1>Tampere</h1><p>Mitä tapahtuu?</p></div>
</header>

<main id="main">

  <!-- VIIKONLOPPU -->
  <div class="view on" id="wk-view">
    <div id="wk-hdr">
      <div class="wk-title-row">
        <span class="wk-main-title">Tämä viikonloppu</span>
        <span class="wk-dates" id="wk-range"></span>
      </div>
      <div class="wk-day-tabs" id="wk-tabs"></div>
    </div>
    <div class="chips-bar" id="wk-chips"></div>
    <div id="wk-scroll"></div>
  </div>

  <!-- TULOSSA -->
  <div class="view" id="tu-view">
    <div id="tu-filter">
      <div class="chip on" onclick="setTuF(null,this)">Kaikki</div>
      <div class="chip" onclick="setTuF('iso',this)">🎪 Isot</div>
      <div class="chip" onclick="setTuF('urheilu',this)">🏟️ Urheilu</div>
      <div class="chip" onclick="setTuF('konsertti',this)">🎼 Konsertit</div>
      <div class="chip" onclick="setTuF('keikka',this)">🎸 Keikat</div>
      <div class="chip" onclick="setTuF('teatteri',this)">🎭 Teatteri</div>
      <div class="chip" onclick="setTuF('taide',this)">🎨 Taide</div>
      <div class="chip" onclick="setTuF('ruoka',this)">🍽️ Ruoka</div>
    </div>
    <div id="tu-scroll"></div>
  </div>

  <!-- KARTTA -->
  <div class="view" id="map-view">
    <div id="map-wrap">
      <div id="map"></div>
      <div id="msearch">
        <span>🔍</span>
        <input type="search" placeholder="Hae tapahtumia…" oninput="mapSearch(this.value)">
      </div>
    </div>
    <div id="map-sheet">
      <div class="sh-handle"></div>
      <div class="sh-title" id="sh-title">Tapahtumat</div>
      <div id="map-list"></div>
    </div>
  </div>

  <!-- HAKU -->
  <div class="view" id="search-view">
    <div id="s-top">
      <input class="s-input" id="s-q" type="search" placeholder="Artisti, genre, paikka, joukkue…" oninput="renderSearch()">
    </div>
    <div class="chips-bar" id="s-chips"></div>
    <div id="s-results"><div class="s-ph"><span class="em">🎸</span>Kirjoita hakusana tai valitse kategoria</div></div>
  </div>

</main>

<nav id="nav">
  <button class="nb on" onclick="sw('wk-view',this)"><span class="nb-icon">📅</span>Viikonloppu</button>
  <button class="nb" onclick="sw('tu-view',this)"><span class="nb-icon">🗓️</span>Tulossa</button>
  <button class="nb" onclick="sw('map-view',this)"><span class="nb-icon">🗺️</span>Kartta</button>
  <button class="nb" onclick="sw('search-view',this)"><span class="nb-icon">🔍</span>Haku</button>
</nav>

<div id="m-ov" onclick="mOvClick(event)"><div id="modal"></div></div>

<script>
/* ─────────────────────────────────────────

/* ─────────────────────────────────────────
   HELPERS
───────────────────────────────────────── */
function addD(d,n){const r=new Date(d);r.setDate(r.getDate()+n);return r;}
function isoDate(d){return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;}
function fmtShort(d){return`${d.getDate()}.${d.getMonth()+1}.`;}
function isFree(p){return p.toLowerCase().includes('ilmainen')||p.toLowerCase().includes('free');}
function eventsOnDay(day){const s=isoDate(day);return EVENTS.filter(e=>e.startDate<=s&&e.endDate>=s);}
function genrePills(genres,small){
  if(!genres||!genres.length)return'';
  return genres.map(g=>{const s=gs(g);return`<span class="g-pill"style="background:${s.bg};color:${s.c};font-size:${small?'9.5px':'10.5px'}">${g}</span>`;}).join('');
}

/* ─────────────────────────────────────────
   WEEKEND (current)
───────────────────────────────────────── */
function getCurrentWeekend(){
  const now=new Date(), d=now.getDay();
  let fri;
  if(d===5)fri=new Date(now);
  else if(d===6)fri=addD(now,-1);
  else if(d===0)fri=addD(now,-2);
  else fri=addD(now,5-d);
  return{fri,sat:addD(fri,1),sun:addD(fri,2)};
}
const CWK=getCurrentWeekend();
let wkDay='sat', wkCatF=null;

function renderWeekend(){
  document.getElementById('wk-range').textContent=`${fmtShort(CWK.fri)}–${fmtShort(CWK.sun)}`;
  const days=[{k:'fri',l:'Pe',d:CWK.fri},{k:'sat',l:'La',d:CWK.sat},{k:'sun',l:'Su',d:CWK.sun}];
  document.getElementById('wk-tabs').innerHTML=days.map(({k,l,d})=>{
    const cnt=eventsOnDay(d).length;
    return`<button class="wk-tab${wkDay===k?' on':''}"onclick="setWkDay('${k}')">
      ${l} ${d.getDate()}.${d.getMonth()+1}.<br><span class="tab-cnt">${cnt}</span>
    </button>`;
  }).join('');
  const dayEvts=eventsOnDay(wkDay==='fri'?CWK.fri:wkDay==='sat'?CWK.sat:CWK.sun);
  const usedCats=[...new Set(dayEvts.map(e=>e.cat))];
  document.getElementById('wk-chips').innerHTML=
    CATS.filter(c=>usedCats.includes(c.id)).map(c=>
      `<div class="chip${wkCatF===c.id?' on':''}"onclick="toggleWkCat('${c.id}')">${c.icon} ${c.label}</div>`
    ).join('');
  renderWkList();
}
function setWkDay(k){wkDay=k;wkCatF=null;renderWeekend();}
function toggleWkCat(id){wkCatF=wkCatF===id?null:id;renderWeekend();}
function renderWkList(){
  const day=wkDay==='fri'?CWK.fri:wkDay==='sat'?CWK.sat:CWK.sun;
  let evts=eventsOnDay(day);
  if(wkCatF)evts=evts.filter(e=>e.cat===wkCatF);
  if(!evts.length){document.getElementById('wk-scroll').innerHTML='<div class="no-evts">Ei tapahtumia tänä päivänä</div>';return;}
  const big=evts.filter(e=>e.size==='big');
  const sports=evts.filter(e=>e.isSport&&e.size!=='big');
  const gigs=evts.filter(e=>e.cat==='keikka'&&!e.isSport&&e.size!=='big');
  const other=evts.filter(e=>!e.isSport&&e.cat!=='keikka'&&e.size!=='big');
  let h='';
  if(big.length)h+='<div class="section-lbl">⭐ Isot tapahtumat</div>'+big.map(bigCard).join('');
  if(sports.length)h+='<div class="section-lbl">🏟️ Urheilu</div>'+sports.map(sportCard).join('');
  if(gigs.length)h+='<div class="section-lbl">🎸 Keikat & klubit</div>'+gigs.map(gigCard).join('');
  if(other.length)h+='<div class="section-lbl">🎉 Muut</div>'+other.map(evCard).join('');
  document.getElementById('wk-scroll').innerHTML=h;
}

/* ─────────────────────────────────────────
   TULOSSA – upcoming weekends
───────────────────────────────────────── */
let tuF=null;

function setTuF(cat,btn){
  tuF=cat;
  document.querySelectorAll('#tu-filter .chip').forEach(c=>c.classList.remove('on'));
  btn.classList.add('on');
  renderTulossa();
}

function getAllUpcomingWeekends(){
  const today=new Date();
  const end=new Date('2026-12-31');
  // Start from the next upcoming Friday (skip current weekend — shown in viikonloppu tab)
  let d=addD(CWK.fri,7);
  const wks=[];
  while(d<=end){
    const fri=new Date(d), sat=addD(fri,1), sun=addD(fri,2);
    // unique events across all 3 days
    const seen=new Set();
    const evts=[];
    [fri,sat,sun].forEach(day=>{
      eventsOnDay(day).forEach(e=>{if(!seen.has(e.id)){seen.add(e.id);evts.push({...e,_day:day});}});
    });
    wks.push({fri,sat,sun,evts});
    d=addD(d,7);
  }
  return wks;
}

function renderTulossa(){
  const wks=getAllUpcomingWeekends();
  const mNames=['tammi','helmi','maalis','huhti','touko','kesä','heinä','elo','syys','loka','marras','joulu'];
  let h='';
  let shown=0;
  wks.forEach((wk,i)=>{
    let evts=wk.evts;
    if(tuF)evts=evts.filter(e=>e.cat===tuF);
    if(!evts.length)return;
    shown++;
    const friL=`${wk.fri.getDate()}.${wk.fri.getMonth()+1}.`;
    const sunL=`${wk.sun.getDate()}.${wk.sun.getMonth()+1}.`;
    const monthL=mNames[wk.fri.getMonth()];
    // Sort: big first, then sports, then others
    const sorted=[
      ...evts.filter(e=>e.size==='big'),
      ...evts.filter(e=>e.isSport&&e.size!=='big'),
      ...evts.filter(e=>!e.isSport&&e.size!=='big'),
    ];
    h+=`<div class="wk-block"id="wkb${i}">
      <div class="wk-block-hdr"onclick="toggleBlock(${i})">
        <div class="wk-block-dates">Pe–Su ${friL}–${sunL} <span style="color:var(--muted);font-weight:500;font-size:12px">${monthL}kuuta</span></div>
        <div class="wk-block-cnt">${sorted.length} tapahtumaa</div>
        <div class="wk-block-toggle">›</div>
      </div>
      <div class="wk-block-body">${sorted.map(e=>tuRow(e,wk)).join('')}</div>
    </div>`;
  });
  if(!shown)h='<div class="no-wk-block">Ei tulevia tapahtumia valitussa kategoriassa</div>';
  document.getElementById('tu-scroll').innerHTML=h+'<div style="height:12px"></div>';
}

function toggleBlock(i){
  const el=document.getElementById('wkb'+i);
  el.classList.toggle('collapsed');
}

function tuRow(e,wk){
  const c=catBy(e.cat);
  const free=isFree(e.price);
  const priceHtml=`<div class="tu-row-price${free?' free':''}">${free?'Ilm.':e.price}</div>`;

  if(e.isSport){
    return`<div class="tu-row"onclick="openModal(${e.id})">
      <div class="tu-sport-icon">${sportIcon(e)}</div>
      <div class="tu-row-left">
        <div class="tu-row-name">${e.team1} vs ${e.team2}</div>
        <div class="tu-row-meta"><span class="sc-league">${e.league}</span><span>📍 ${e.location}</span><span>${e.dates}</span></div>
      </div>
      ${priceHtml}
      <div class="tu-arrow">›</div>
    </div>`;
  }
  if(e.size==='big'){
    return`<div class="tu-row"onclick="openModal(${e.id})">
      <div class="tu-big-dot"style="background:${c.color}"></div>
      <div class="tu-row-left">
        <div class="tu-row-name">${e.name} <span class="tu-badge-big">ISO</span></div>
        <div class="tu-row-meta"><span style="color:${c.color};font-weight:600">${c.icon} ${c.label}</span><span>📍 ${e.location}</span><span>${e.dates}</span></div>
      </div>
      ${priceHtml}
      <div class="tu-arrow">›</div>
    </div>`;
  }
  // gig row with genre pills
  return`<div class="tu-row"onclick="openModal(${e.id})">
    <div class="tu-dot"style="background:${c.color}"></div>
    <div class="tu-row-left">
      <div class="tu-row-name">${e.name}</div>
      <div class="tu-row-meta">
        <span>📍 ${e.location}</span><span>${e.dates}</span>
      </div>
      ${e.genres?`<div class="tu-genre-pills">${genrePills(e.genres,true)}</div>`:''}
    </div>
    ${priceHtml}
    <div class="tu-arrow">›</div>
  </div>`;
}

/* ─────────────────────────────────────────
   CARD RENDERERS
───────────────────────────────────────── */
function bigCard(e){
  const c=catBy(e.cat),free=isFree(e.price);
  if(e.isSport)return`<div class="big-card"onclick="openModal(${e.id})">
    <div class="bc-banner"style="background:linear-gradient(135deg,${c.color},${c.color}cc)">
      <div class="bc-badge">${sportIcon(e)} ${e.league}</div>
      <div class="bc-name">${e.team1} <span style="opacity:.7">vs</span> ${e.team2}</div>
      <div class="bc-sub">${e.location}</div>
    </div>
    <div class="bc-foot"><div class="bc-meta"><strong>${e.dates}</strong><span>📍 ${e.location}</span></div>
    <div class="bc-price"style="color:${c.color}">${free?'Ilmainen':e.price}</div><div class="bc-arrow">›</div></div>
  </div>`;
  return`<div class="big-card"onclick="openModal(${e.id})">
    <div class="bc-banner"style="background:linear-gradient(135deg,${c.color},${c.color}bb)">
      <div class="bc-badge">${c.icon} ${c.label}</div>
      <div class="bc-name">${e.name}</div>${e.sub?`<div class="bc-sub">${e.sub}</div>`:''}
    </div>
    <div class="bc-foot"><div class="bc-meta"><strong>${e.dates}</strong><span>📍 ${e.location}</span></div>
    <div class="bc-price"style="color:${c.color}">${free?'Ilmainen':e.price}</div><div class="bc-arrow">›</div></div>
  </div>`;
}
function sportCard(e){
  const c=catBy(e.cat),free=isFree(e.price);
  return`<div class="sport-card"onclick="openModal(${e.id})">
    <div class="sc-stripe"style="background:${c.color}"></div>
    <div class="sc-body">
      <div class="sc-icon">${sportIcon(e)}</div>
      <div class="sc-info">
        <div class="sc-teams">${e.team1} vs ${e.team2}</div>
        <div class="sc-meta"><span>${e.dates}</span><span class="sc-league">${e.league}</span></div>
        <div class="sc-meta"><span>📍 ${e.location}</span></div>
      </div>
      <div class="sc-price">${free?'Ilm.':e.price}</div>
    </div>
  </div>`;
}
function gigCard(e){
  const free=isFree(e.price);
  return`<div class="gig-card"onclick="openModal(${e.id})">
    <div class="gc-body">
      <div class="gc-top">
        <div class="gc-left">
          <div class="gc-name">${e.name}</div>
          <div class="gc-sub"><span>📍 ${e.location}</span><span>📅 ${e.dates}</span></div>
          ${e.genres?`<div class="genre-pills">${genrePills(e.genres)}</div>`:''}
        </div>
        <div class="gc-price ${free?'free':'paid'}">${free?'Ilmainen':e.price}</div>
      </div>
      ${e.soundsLike?`<div class="gc-soundslike">💬 ${e.soundsLike.slice(0,130)}${e.soundsLike.length>130?'…':''}</div>`:''}
    </div>
  </div>`;
}
function evCard(e){
  const c=catBy(e.cat),free=isFree(e.price);
  return`<div class="ev-card"onclick="openModal(${e.id})">
    <div class="ev-left">
      <div class="cat-badge"style="color:${c.color};background:${c.bg}">${c.icon} ${c.label}</div>
      <div class="ev-name">${e.name}</div>
      <div class="ev-meta"><span>📅 ${e.dates}</span><span>📍 ${e.location}</span></div>
    </div>
    <div class="price-tag ${free?'free':'paid'}">${free?'Ilmainen':e.price}</div>
  </div>`;
}
function autoCard(e){
  if(e.cat==='keikka'&&!e.isSport&&e.size!=='big')return gigCard(e);
  if(e.isSport&&e.size==='big')return bigCard(e);
  if(e.isSport)return sportCard(e);
  if(e.size==='big')return bigCard(e);
  return evCard(e);
}

/* ─────────────────────────────────────────
   MAP
───────────────────────────────────────── */
let map,mLayer;
function initMap(){
  map=L.map('map',{zoomControl:false,attributionControl:false}).setView([61.4978,23.7610],13);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png',{maxZoom:19}).addTo(map);
  L.control.zoom({position:'bottomright'}).addTo(map);
  mLayer=L.layerGroup().addTo(map);
  renderMapMarkers('');
}
function mapSearch(q){renderMapMarkers(q);}
function renderMapMarkers(q){
  mLayer.clearLayers();
  const lq=q.toLowerCase();
  const evts=EVENTS.filter(e=>!lq||(e.name+e.location+(e.sub||'')+(e.team1||'')+(e.team2||'')).toLowerCase().includes(lq));
  evts.forEach(e=>{
    const c=catBy(e.cat);
    const sz=e.size==='big'?26:20;
    const icon=L.divIcon({html:`<div style="width:${sz}px;height:${sz}px;background:${c.color};border-radius:50% 50% 50% 0;transform:rotate(-45deg);border:2.5px solid white;box-shadow:0 2px 8px rgba(0,0,0,.3)"></div>`,className:'',iconSize:[sz,sz],iconAnchor:[sz/2,sz]});
    L.marker([e.lat,e.lng],{icon}).addTo(mLayer).on('click',()=>openModal(e.id));
  });
  document.getElementById('map-list').innerHTML=evts.slice(0,40).map(e=>{
    const c=catBy(e.cat);
    const nm=e.isSport?`${e.team1} vs ${e.team2}`:e.name;
    return`<div class="map-ev"onclick="openModal(${e.id})">
      <div class="map-dot"style="background:${c.color}"></div>
      <div style="flex:1;min-width:0"><div class="map-ev-name">${nm}</div><div class="map-ev-sub">${e.location} · ${e.dates}</div></div>
    </div>`;
  }).join('');
  document.getElementById('sh-title').textContent=`Tapahtumat (${evts.length})`;
}

/* ─────────────────────────────────────────
   SEARCH
───────────────────────────────────────── */
let sCatF=null;
function renderSChips(){
  document.getElementById('s-chips').innerHTML=
    CATS.map(c=>`<div class="chip${sCatF===c.id?' on':''}"onclick="toggleSCat('${c.id}')">${c.icon} ${c.label}</div>`).join('');
}
function toggleSCat(id){sCatF=sCatF===id?null:id;renderSearch();}
function renderSearch(){
  const q=document.getElementById('s-q').value.toLowerCase();
  renderSChips();
  if(!q&&!sCatF){document.getElementById('s-results').innerHTML='<div class="s-ph"><span class="em">🎸</span>Kirjoita artisti, genre tai paikka</div>';return;}
  const evts=EVENTS.filter(e=>{
    const blob=[e.name,e.location,e.sub||'',(e.genres||[]).join(' '),e.soundsLike||'',e.team1||'',e.team2||''].join(' ').toLowerCase();
    return(!q||blob.includes(q))&&(!sCatF||e.cat===sCatF);
  });
  document.getElementById('s-results').innerHTML=evts.length?evts.map(autoCard).join(''):'<div class="s-ph"><span class="em">😕</span>Ei tuloksia</div>';
}

/* ─────────────────────────────────────────
   MODAL
───────────────────────────────────────── */
function openModal(id){
  const e=EVENTS.find(x=>x.id===id);if(!e)return;
  const c=catBy(e.cat),free=isFree(e.price);
  let h='<div class="m-handle"></div>';
  if(e.isSport){
    h+=`<div class="m-sport-hdr"style="background:linear-gradient(160deg,${c.color}22,transparent)">
      <div style="display:inline-flex;align-items:center;gap:5px;background:${c.bg};color:${c.color};font-size:10px;font-weight:800;letter-spacing:.5px;text-transform:uppercase;padding:3px 8px;border-radius:20px;margin-bottom:8px">${sportIcon(e)} ${e.league}</div>
      <div class="m-teams">
        <div class="m-team"><div class="m-team-name">${e.team1}</div><div class="m-team-sub">Koti</div></div>
        <div class="m-vs">VS</div>
        <div class="m-team"><div class="m-team-name">${e.team2}</div><div class="m-team-sub">Vieras</div></div>
      </div>
    </div>
    <div class="m-hdr" style="padding-top:8px">
      <div class="m-title"><h2 style="font-size:16px;margin-top:0">${e.name||e.team1+' vs '+e.team2}</h2></div>
      <button class="m-close2"onclick="closeModal()">✕</button>
    </div>`;
  } else if(e.size==='big'){
    h+=`<div class="m-banner"style="background:linear-gradient(135deg,${c.color},${c.color}cc)">
      <button class="m-close-b"onclick="closeModal()">✕</button>
      <div class="m-banner-badge">${c.icon} ${c.label}</div>
      <h2>${e.name}</h2>${e.sub?`<p>${e.sub}</p>`:''}
    </div>`;
  } else {
    h+=`<div class="m-hdr"><div class="m-title">
      <div class="cat-badge"style="color:${c.color};background:${c.bg}">${c.icon} ${c.label}</div>
      <h2>${e.name}</h2>
    </div><button class="m-close2"onclick="closeModal()">✕</button></div>`;
  }
  h+=`<div class="m-body">
    <div class="m-row"><span class="m-icon">📅</span><div><div class="m-lbl">Ajankohta</div>${e.dates}</div></div>
    <div class="m-row"><span class="m-icon">📍</span><div><div class="m-lbl">Paikka</div>${e.location}${e.address?', '+e.address:''}</div></div>
    <div class="m-row"><span class="m-icon">🎟️</span><div><div class="m-lbl">Hinta</div>
      <span style="font-weight:700;color:${free?'#059669':'var(--red)'}">${free?'Ilmainen':e.price}</span>
    </div></div>`;
  if(e.genres?.length||e.soundsLike){
    h+=`<div class="m-genre-block">`;
    if(e.genres?.length)h+=`<div class="m-lbl"style="margin-bottom:6px">Tyyli</div><div class="m-genre-row">${genrePills(e.genres)}</div>`;
    if(e.soundsLike)h+=`<div class="m-sl">💬 ${e.soundsLike}</div>`;
    if(e.spotifyQ||e.youtubeQ){
      h+=`<div class="listen-btns">`;
      if(e.spotifyQ)h+=`<a class="listen-btn sp"href="https://open.spotify.com/search/${encodeURIComponent(e.spotifyQ)}"target="_blank"rel="noopener">▶ Spotify</a>`;
      if(e.youtubeQ)h+=`<a class="listen-btn yt"href="https://www.youtube.com/results?search_query=${encodeURIComponent(e.youtubeQ)}"target="_blank"rel="noopener">▶ YouTube</a>`;
      h+=`</div>`;
    }
    h+=`</div>`;
  }
  h+=`<p class="m-desc">${e.desc}</p>
    <a class="m-cta"href="${e.url}"target="_blank"rel="noopener">Lisätietoja & liput →</a>
  </div>`;
  document.getElementById('modal').innerHTML=h;
  document.getElementById('m-ov').classList.add('on');
}
function mOvClick(ev){if(ev.target===document.getElementById('m-ov'))closeModal();}
function closeModal(){document.getElementById('m-ov').classList.remove('on');}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal();});

/* ─────────────────────────────────────────
   VIEW SWITCHING
───────────────────────────────────────── */
function sw(viewId,btn){
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('on'));
  document.querySelectorAll('.nb').forEach(b=>b.classList.remove('on'));
  document.getElementById(viewId).classList.add('on');
  btn.classList.add('on');
  if(viewId==='map-view')setTimeout(()=>map&&map.invalidateSize(),60);
  if(viewId==='search-view'){renderSChips();renderSearch();}
}

/* ─────────────────────────────────────────
   INIT
───────────────────────────────────────── */
document.addEventListener('DOMContentLoaded',()=>{
  renderWeekend();
  renderTulossa();
  renderSChips();
  initMap();
});
</script>
</body>
</html>
