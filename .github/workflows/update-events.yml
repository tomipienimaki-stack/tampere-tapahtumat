name: Päivitä tapahtumat meteli.net:stä

on:
  schedule:
    # Joka maanantai klo 05:00 UTC (08:00 Suomen aikaa)
    - cron: '0 5 * * 1'
  # Voi ajaa myös käsin GitHub Actions -sivulta
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape-and-update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Asenna riippuvuudet
        run: npm install

      - name: Asenna Chromium-riippuvuudet
        run: |
          sudo apt-get update -q
          sudo apt-get install -y -q \
            libgbm-dev libasound2 libatk1.0-0 libatk-bridge2.0-0 \
            libcups2 libdrm2 libgdk-pixbuf2.0-0 libgtk-3-0 \
            libnspr4 libnss3 libxcomposite1 libxdamage1 libxfixes3 \
            libxkbcommon0 libxrandr2 xvfb

      - name: Aja scraper
        run: node scripts/scrape-meteli.js

      - name: Tarkista onko muutoksia
        id: changes
        run: |
          git diff --quiet index.html && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commitoi päivitys
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          DATE=$(date +'%-d.%-m.%Y')
          git add index.html
          git commit -m "auto: päivitä tapahtumat ${DATE} (meteli.net)"
          git push
